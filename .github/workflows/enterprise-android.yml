name: Enterprise Android

on:
  push:
    branches:
      - main
    paths:
      - "Enterprise/**"
      - ".github/workflows/enterprise-android.yml"
  pull_request:
    paths:
      - "Enterprise/**"
      - ".github/workflows/enterprise-android.yml"
  workflow_dispatch:

env:
  JAVA_VERSION: "17"
  NODE_VERSION: "18"
  ANDROID_COMPILE_SDK: "34"
  ANDROID_BUILD_TOOLS: "34.0.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify_web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Enterprise
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-${ANDROID_COMPILE_SDK}" "build-tools;${ANDROID_BUILD_TOOLS}"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build web app
        run: npm run build

      - name: Sync Android wrapper
        run: npm run android:sync

      - name: Upload web dist
        uses: actions/upload-artifact@v4
        with:
          name: enterprise-web-dist
          path: Enterprise/dist

  build_debug_apk:
    runs-on: ubuntu-latest
    needs: verify_web
    defaults:
      run:
        working-directory: Enterprise
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-${ANDROID_COMPILE_SDK}" "build-tools;${ANDROID_BUILD_TOOLS}"

      - name: Install dependencies
        run: npm ci

      - name: Build and sync
        run: |
          npm run build
          npm run android:sync

      - name: Assemble debug APK
        working-directory: Enterprise/android
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: enterprise-debug-apk
          path: Enterprise/android/app/build/outputs/apk/debug/app-debug.apk

  build_release_apk:
    runs-on: ubuntu-latest
    needs: verify_web
    defaults:
      run:
        working-directory: Enterprise
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-${ANDROID_COMPILE_SDK}" "build-tools;${ANDROID_BUILD_TOOLS}"

      - name: Install dependencies
        run: npm ci

      - name: Build and sync
        run: |
          npm run build
          npm run android:sync

      - name: Check signing secrets
        id: signing
        shell: bash
        env:
          ENTERPRISE_RELEASE_KEYSTORE_BASE64: ${{ secrets.ENTERPRISE_RELEASE_KEYSTORE_BASE64 }}
          ENTERPRISE_RELEASE_STORE_PASSWORD: ${{ secrets.ENTERPRISE_RELEASE_STORE_PASSWORD }}
          ENTERPRISE_RELEASE_KEY_ALIAS: ${{ secrets.ENTERPRISE_RELEASE_KEY_ALIAS }}
          ENTERPRISE_RELEASE_KEY_PASSWORD: ${{ secrets.ENTERPRISE_RELEASE_KEY_PASSWORD }}
        run: |
          missing=()
          for key in ENTERPRISE_RELEASE_KEYSTORE_BASE64 ENTERPRISE_RELEASE_STORE_PASSWORD ENTERPRISE_RELEASE_KEY_ALIAS ENTERPRISE_RELEASE_KEY_PASSWORD; do
            if [ -z "${!key:-}" ]; then
              missing+=("$key")
            fi
          done
          mkdir -p release-artifacts
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Release APK skipped. Missing GitHub secrets: %s\n' "${missing[*]}" | tee release-artifacts/release-blocked.txt
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare signing config
        if: steps.signing.outputs.ready == 'true'
        shell: bash
        env:
          ENTERPRISE_RELEASE_KEYSTORE_BASE64: ${{ secrets.ENTERPRISE_RELEASE_KEYSTORE_BASE64 }}
          ENTERPRISE_RELEASE_STORE_PASSWORD: ${{ secrets.ENTERPRISE_RELEASE_STORE_PASSWORD }}
          ENTERPRISE_RELEASE_KEY_ALIAS: ${{ secrets.ENTERPRISE_RELEASE_KEY_ALIAS }}
          ENTERPRISE_RELEASE_KEY_PASSWORD: ${{ secrets.ENTERPRISE_RELEASE_KEY_PASSWORD }}
        run: |
          echo "$ENTERPRISE_RELEASE_KEYSTORE_BASE64" | base64 --decode > android/app/enterprise-release.keystore
          cat >> android/gradle.properties <<EOF
          ENTERPRISE_RELEASE_STORE_FILE=app/enterprise-release.keystore
          ENTERPRISE_RELEASE_STORE_PASSWORD=$ENTERPRISE_RELEASE_STORE_PASSWORD
          ENTERPRISE_RELEASE_KEY_ALIAS=$ENTERPRISE_RELEASE_KEY_ALIAS
          ENTERPRISE_RELEASE_KEY_PASSWORD=$ENTERPRISE_RELEASE_KEY_PASSWORD
          EOF

      - name: Assemble release APK
        if: steps.signing.outputs.ready == 'true'
        working-directory: Enterprise/android
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon assembleRelease
          mkdir -p ../release-artifacts
          cp app/build/outputs/apk/release/app-release.apk ../release-artifacts/app-release.apk

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: enterprise-release-output
          path: Enterprise/release-artifacts
