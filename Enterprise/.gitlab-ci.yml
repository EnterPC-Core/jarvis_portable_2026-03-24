stages:
  - verify
  - build_debug
  - build_release

variables:
  NODE_VERSION: "18.20.8"
  ANDROID_COMPILE_SDK: "34"
  ANDROID_BUILD_TOOLS: "34.0.0"
  ANDROID_SDK_ROOT: "$CI_PROJECT_DIR/.android-sdk"
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"

cache:
  key: "enterprise-android"
  paths:
    - node_modules/
    - .gradle/

.android_setup:
  image: debian:bookworm-slim
  before_script:
    - apt-get update
    - apt-get install -y ca-certificates curl unzip xz-utils openjdk-17-jdk git python3
    - export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
    - export PATH="$JAVA_HOME/bin:$PATH"
    - mkdir -p .node
    - curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-x64.tar.xz" -o .node/node.tar.xz
    - tar -xJf .node/node.tar.xz -C .node
    - export PATH="$CI_PROJECT_DIR/.node/node-v${NODE_VERSION}-linux-x64/bin:$PATH"
    - node -v
    - npm -v
    - mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
    - curl -fsSL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o /tmp/android-tools.zip
    - unzip -q /tmp/android-tools.zip -d /tmp/android-tools
    - rm -rf "$ANDROID_SDK_ROOT/cmdline-tools/latest"
    - mv /tmp/android-tools/cmdline-tools "$ANDROID_SDK_ROOT/cmdline-tools/latest"
    - export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
    - yes | sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --licenses > /dev/null
    - sdkmanager --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "platforms;android-${ANDROID_COMPILE_SDK}" "build-tools;${ANDROID_BUILD_TOOLS}"
    - npm ci
    - npm run build
    - npm run android:sync

verify_web:
  stage: verify
  extends: .android_setup
  script:
    - npm run typecheck
    - test -f dist/index.html
    - test -f android/gradlew
  artifacts:
    expire_in: 7 days
    paths:
      - dist/

build_debug_apk:
  stage: build_debug
  extends: .android_setup
  script:
    - cd android
    - chmod +x gradlew
    - ./gradlew --no-daemon assembleDebug
  artifacts:
    expire_in: 14 days
    paths:
      - android/app/build/outputs/apk/debug/app-debug.apk

build_release_apk:
  stage: build_release
  extends: .android_setup
  script:
    - |
      missing=""
      for name in ENTERPRISE_RELEASE_KEYSTORE_BASE64 ENTERPRISE_RELEASE_STORE_PASSWORD ENTERPRISE_RELEASE_KEY_ALIAS ENTERPRISE_RELEASE_KEY_PASSWORD; do
        if [ -z "${!name:-}" ]; then
          missing="$missing $name"
        fi
      done
      mkdir -p release-artifacts
      if [ -n "$missing" ]; then
        printf "Release APK skipped. Missing GitLab variables:%s\n" "$missing" | tee release-artifacts/release-blocked.txt
        exit 0
      fi
    - echo "$ENTERPRISE_RELEASE_KEYSTORE_BASE64" | base64 -d > android/app/enterprise-release.keystore
    - |
      cat >> android/gradle.properties <<EOF
      ENTERPRISE_RELEASE_STORE_FILE=app/enterprise-release.keystore
      ENTERPRISE_RELEASE_STORE_PASSWORD=$ENTERPRISE_RELEASE_STORE_PASSWORD
      ENTERPRISE_RELEASE_KEY_ALIAS=$ENTERPRISE_RELEASE_KEY_ALIAS
      ENTERPRISE_RELEASE_KEY_PASSWORD=$ENTERPRISE_RELEASE_KEY_PASSWORD
      EOF
    - cd android
    - chmod +x gradlew
    - ./gradlew --no-daemon assembleRelease
    - cp app/build/outputs/apk/release/app-release.apk ../release-artifacts/app-release.apk
  artifacts:
    expire_in: 14 days
    paths:
      - release-artifacts/
